services:
  - type: web
    name: carbon-portal-server
    env: node
    buildCommand: "cd shared && npm install && npm run build && cd ../server && npm install && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromGroup: carbon-portal-secrets
      - key: UPSTASH_REDIS_REST_URL
        fromGroup: carbon-portal-secrets
      - key: UPSTASH_REDIS_REST_TOKEN
        fromGroup: carbon-portal-secrets
      - key: JWT_ACCESS_SECRET
        fromGroup: carbon-portal-secrets
      - key: JWT_REFRESH_SECRET
        fromGroup: carbon-portal-secrets
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_HOST
        fromGroup: carbon-portal-secrets
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        fromGroup: carbon-portal-secrets
      - key: EMAIL_PASS
        fromGroup: carbon-portal-secrets
      - key: EMAIL_FROM
        value: noreply@iitbhu.ac.in
      - key: CLIENT_URL
        value: https://carbon-portal-client.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://carbon-portal-client.onrender.com
      - key: ADMIN_DEFAULT_PASSWORD
        fromGroup: carbon-portal-secrets

  - type: web
    name: carbon-portal-client
    env: node
    buildCommand: "cd shared && npm install && npm run build && cd ../client && npm install && npm run build"
    startCommand: "cd client && npx serve -s dist -l 3000"
    envVars:
      - key: VITE_API_URL
        value: https://carbontrack-iitbhu.onrender.com
